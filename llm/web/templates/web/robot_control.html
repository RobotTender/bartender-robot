<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Robot Control</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #081634;
      color: #e6f1ff;
      font-family: "Noto Sans KR", sans-serif;
      padding: 20px;
    }
    .card {
      width: min(680px, 100%);
      border: 1px solid rgba(121, 189, 255, 0.4);
      border-radius: 14px;
      background: rgba(12, 28, 70, 0.85);
      padding: 20px;
    }
    h1 { margin: 0 0 12px; }
    pre {
      margin: 0;
      padding: 14px;
      border-radius: 10px;
      background: rgba(4, 14, 38, 0.8);
      border: 1px solid rgba(120, 185, 255, 0.28);
      overflow: auto;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>로봇 제어 단계</h1>
    <pre>{{ recipe }}</pre>
  </main>
</body>
</html>
